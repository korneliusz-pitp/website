title: Sustainability & Environmental Commitment
callToAction:
  title: Join Our Green Journey
  description: Every attendee plays a vital role in our sustainability mission. Together, we can create amazing events whilst protecting our planet.
  buttons:
    - label: Upcoming Events
      to: /events/upcoming
      color: primary
      variant: solid
      icon: i-lucide-calendar
    - label: Environmental Policy
      to: /policies/environmental-impact
      variant: outline
      icon: i-lucide-file-text
description: At Pups in the Park, we believe in protecting the natural spaces we love. Our sustainability initiatives ensure every event leaves a pawsitive impact on the environment.
hero:
  image: idk an image can go here
  alt: Community members enjoying the park during a Pups in the Park event
initiatives:
  - title: Zero-Waste Target
    description: Working towards eliminating all waste sent to landfill through comprehensive recycling, composting, and waste reduction programmes at every event.
    icon: i-lucide-target
  - title: Green Partnerships
    description: Collaborating exclusively with eco-conscious vendors, suppliers, and venues who demonstrate genuine commitment to environmental sustainability.
    icon: i-lucide-handshake
  - title: Community Education
    description: Empowering attendees with practical knowledge about sustainable living and environmental stewardship they can implement beyond our events.
    icon: i-lucide-graduation-cap
  - title: Continuous Improvement
    description: Regular sustainability audits, carbon footprint tracking, and community feedback collection to identify new environmental opportunities.
    icon: i-lucide-trending-up
  - title: Local Ecosystem Support
    description: Active contribution to local conservation efforts and partnerships with environmental organisations in the areas where we host events.
    icon: i-lucide-trees
  - title: Renewable Energy Advocacy
    description: Prioritising venues with renewable energy sources and supporting the transition to clean power in event spaces.
    icon: i-lucide-zap
sections:
  - title: Waste Reduction & Recycling
    description: Comprehensive waste management strategies to ensure proper disposal and recycling at every event.
    icon: i-lucide-recycle
    reverse: false
    image: https://placehold.co/800?text=Placeholder&font=poppins
    imageAlt: Park environment during our event
    features:
      - title: Recycling Stations
        description: Clearly marked bins for recyclables, compostables, and general waste throughout the venue.
        icon: i-lucide-trash-2
      - title: Council Partnership
        description: Working with local councils to ensure all waste is processed responsibly.
        icon: i-lucide-handshake
      - title: Post-Event Clean-up
        description: Dedicated stewards conduct thorough operations to leave parks in pristine condition.
        icon: i-lucide-sparkles
  - title: Sustainable Event Materials
    description: Every decision considers environmental impact, from biodegradable name tags to reusable signage.
    icon: i-lucide-leaf
    reverse: true
    image: https://placehold.co/800?text=Placeholder&font=poppins
    features:
      - title: Zero Single-Use Plastics
        description: Eliminated wherever possible from all event operations.
        icon: i-lucide-ban
      - title: Eco-Friendly Merchandise
        description: Sourced from sustainable suppliers who share our environmental values.
        icon: i-lucide-shopping-bag
      - title: Digital First
        description: Tickets and communications reduce paper waste whilst improving accessibility.
        icon: i-lucide-smartphone
      - title: Reusable Systems
        description: Signage and event materials designed for multiple uses.
        icon: i-lucide-repeat
  - title: Green Transport & Carbon Offsetting
    description: Reducing our collective carbon footprint through sustainable travel choices.
    icon: i-lucide-train-front
    reverse: false
    image: https://placehold.co/800?text=Placeholder&font=poppins
    features:
      - title: Public Transport First
        description: Events located for easy access via eco-friendly transport options.
        icon: i-lucide-bus
      - title: Carpooling Coordination
        description: Information and support for attendees sharing journeys.
        icon: i-lucide-users
      - title: Team Leadership
        description: Our team leads by example using public transport and electric vehicles.
        icon: i-lucide-leaf
      - title: Carbon Offsetting
        description: Exploring programmes to neutralise environmental impact.
        icon: i-lucide-cloud
  - title: Biodiversity & Wildlife Protection
    description: Respecting nature extends beyond litter collection to active ecosystem protection.
    icon: i-lucide-bird
    reverse: true
    image: https://placehold.co/800?text=Placeholder&font=poppins
    features:
      - title: Wildlife-Friendly Scheduling
        description: Events timed to minimise disruption to local wildlife and nesting seasons.
        icon: i-lucide-calendar-clock
      - title: Trained Stewards
        description: Staff identify and protect sensitive areas within event spaces.
        icon: i-lucide-shield-check
      - title: Authority Partnership
        description: Working with park authorities to enhance rather than damage ecosystems.
        icon: i-lucide-building
      - title: Education Materials
        description: Help attendees understand and appreciate the natural environment.
        icon: i-lucide-book-open
        to: /policies/environmental-impact
