title: About Pups in the Park
callToAction:
  title: Get Involved
  description: Join us at one of our regular meetups or events, or get in touch to learn how you can contribute to our community.
  buttons:
    - label: View Upcoming Events
      to: /events/upcoming
      color: primary
      variant: solid
      icon: i-lucide-calendar
    - label: Join the Discord
      to: https://discord.gg/9Sz2msbSDq
      target: _blank
      color: neutral
      variant: outline
      icon: i-simple-icons-discord
description: Learn about our community, values, and the team behind Pups in the Park.
intro: "Welcome to Pups In The Park! We are a British-Made and Also The Largest Alterhuman/Kemonomimi Community in the UK! We host currently 2 events a year where members of our community can get together, trade their creations and meet their favorite content creators! We pride ourselves in our Authenticity and our Strong community & Inclusivity to all! We are proud to host our events out in the Wild! "
mission:
  title: Our Mission
  content: To foster an inclusive, safe, and vibrant community where people interested in kemonomimi culture and alternative lifestyles can express themselves authentically and build meaningful connections with others who share their passions.
values:
  - label: Inclusivity
    description: We welcome everyone who shares our values, regardless of background, identity, or experience.
    icon: i-lucide-users
  - label: Safety
    description: We prioritise the safety and wellbeing of all community members through clear policies and attentive organisation.
    icon: i-lucide-shield-check
  - label: Respect
    description: We treat each other with kindness, respect, and consideration for different perspectives.
    icon: i-lucide-heart-handshake
  - label: Authenticity
    description: We celebrate and encourage genuine self-expression and the freedom to be yourself.
    icon: i-lucide-sparkles
  - label: Community
    description: We believe in the power of coming together and supporting one another.
    icon: i-lucide-hand-helping
