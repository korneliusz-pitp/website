title: Get Involved
callToAction:
  title: Questions?
  description: If you have any questions about volunteering or the application process, we're here to help.
  buttons:
    - label: Contact us
      to: /contact
      icon: i-lucide-mail
      color: primary
      variant: outline
    - label: Join the Discord
      to: https://discord.gg/9Sz2msbSDq
      target: _blank
      color: info
      variant: outline
      icon: i-simple-icons-discord
description: Volunteer roles and our application process
intro: Here at Pups In The Park, community is everything; thats why  in order to run our amazing events; we need vital Volunteers and Helpers to help us! Here you can see the relative roles you can apply for!
partnershipSection:
  title: Content Creators & Businesses
  description: Are you a content creator or business looking to collaborate with us? We have exciting partnership opportunities available!
  link:
    label: Explore Opportunities
    to: /partnership
    icon: i-lucide-handshake
    color: secondary
    variant: solid
timeline:
  - title: Submit Application
    description: Share your details and role preferences via the form.
    icon: i-lucide-file-input
  - title: Acknowledgement
    description: The form will acknowledge and log your application.
    icon: i-lucide-mail
  - title: Review
    description: We assess fit, availability, and any required credentials.
    icon: i-lucide-search
  - title: Chat
    description: A short call or messages to align expectations.
    icon: i-lucide-message-circle
  - title: Decision
    description: We'll let you know the outcome and any alternatives.
    icon: i-lucide-badge-check
  - title: Onboarding + Training
    description: Briefing, policies, and role-specific guidance before the event.
    icon: i-lucide-clipboard-check
